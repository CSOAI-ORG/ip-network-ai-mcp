name: ip-network-ai-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: parse_ip
  description: Parse and analyze an IP address (v4 or v6).
  parameters:
  - name: ip_address
    type: string
    required: true
- name: subnet_calculator
  description: Calculate subnet details from CIDR notation (e.g., 192.168.1.0/24).
  parameters:
  - name: network
    type: string
    required: true
- name: cidr_to_range
  description: Convert CIDR notation to IP range with detailed info.
  parameters:
  - name: cidr
    type: string
    required: true
- name: dns_lookup_data
  description: Perform DNS lookup for a hostname.
  parameters:
  - name: hostname
    type: string
    required: true
